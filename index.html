<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlazeWebGuide — Learn Web Dev from Zero to Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.33.0/ace.min.js"></script>
<script src="curriculum.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --surface: #111318;
  --card: #181b22;
  --border: rgba(99,102,241,0.12);
  --text: #e2e8f0;
  --text-sec: #94a3b8;
  --accent: #6366f1;
  --accent-light: #818cf8;
  --success: #22c55e;
  --warn: #f59e0b;
  --code-font: 'JetBrains Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#2a2d3a; border-radius:3px; }
.app-container { display:flex; height:100vh; overflow:hidden; }
.sidebar { width:280px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow:hidden; }
.sidebar-header { padding:20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
.sidebar-header .logo { width:36px; height:36px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:16px; color:#fff; }
.sidebar-header h1 { font-size:15px; font-weight:700; }
.sidebar-header h1 span { color:var(--accent-light); }
.sidebar-nav { flex:1; overflow-y:auto; padding:12px; }
.level-selector { display:flex; flex-direction:column; gap:6px; }
.level-btn { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:10px; border:1px solid transparent; background:transparent; color:var(--text-sec); cursor:pointer; transition:all 0.2s; text-align:left; width:100%; font-family:inherit; font-size:13px; }
.level-btn:hover { background:rgba(99,102,241,0.08); color:var(--text); }
.level-btn.active { background:rgba(99,102,241,0.12); border-color:var(--accent); color:var(--accent-light); }
.level-btn .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.level-btn .lvl-name { font-weight:600; flex:1; }
.level-btn .count { font-size:11px; opacity:0.6; }
.module-group { margin-bottom:8px; }
.module-header { display:flex; align-items:center; gap:8px; padding:10px 14px; border-radius:8px; cursor:pointer; transition:all 0.2s; font-size:12px; font-weight:600; color:var(--text-sec); border:none; width:100%; text-align:left; font-family:inherit; }
.module-header:hover { background:rgba(255,255,255,0.04); color:var(--text); }
.module-header .arrow { transition:transform 0.2s; font-size:10px; }
.module-header.open .arrow { transform:rotate(90deg); }
.module-header .mod-progress { margin-left:auto; font-size:10px; opacity:0.5; }
.lesson-list { padding-left:20px; display:none; }
.lesson-list.open { display:block; }
.lesson-item { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:6px; cursor:pointer; transition:all 0.2s; font-size:12px; color:var(--text-sec); border:none; width:100%; text-align:left; font-family:inherit; }
.lesson-item:hover { background:rgba(255,255,255,0.04); color:var(--text); }
.lesson-item.active { color:var(--accent-light); background:rgba(99,102,241,0.08); }
.lesson-item.completed { color:var(--success); }
.lesson-item .check { width:16px; text-align:center; font-size:11px; }
.lesson-item .dur { margin-left:auto; font-size:10px; opacity:0.4; }
.main-content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.top-bar { display:flex; align-items:center; gap:16px; padding:12px 24px; border-bottom:1px solid var(--border); background:rgba(10,12,16,0.8); backdrop-filter:blur(12px); flex-shrink:0; }
.search-box { flex:1; max-width:400px; position:relative; }
.search-box input { width:100%; padding:8px 14px 8px 36px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:13px; font-family:inherit; outline:none; }
.search-box input:focus { border-color:var(--accent); }
.search-box .icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:14px; opacity:0.4; }
.top-actions { display:flex; align-items:center; gap:8px; }
.top-btn { padding:7px 14px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text-sec); cursor:pointer; font-size:12px; font-family:inherit; transition:all 0.2s; }
.top-btn:hover { border-color:var(--accent); color:var(--text); background:rgba(99,102,241,0.08); }
.content-area { flex:1; overflow-y:auto; padding:32px; }
.landing { max-width:900px; margin:0 auto; }
.hero-section { text-align:center; padding:60px 0 40px; }
.hero-section h1 { font-size:42px; font-weight:900; letter-spacing:-1px; line-height:1.1; margin-bottom:16px; }
.hero-section h1 span { color:var(--accent-light); }
.hero-section p { font-size:16px; color:var(--text-sec); max-width:600px; margin:0 auto 32px; line-height:1.6; }
.stats { display:flex; justify-content:center; gap:40px; margin-bottom:48px; }
.stat-item { text-align:center; }
.stat-num { font-size:28px; font-weight:800; }
.stat-label { font-size:12px; color:var(--text-sec); margin-top:2px; }
.level-cards { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; margin-bottom:40px; }
.level-card { padding:24px; border-radius:14px; border:1px solid var(--border); background:var(--card); cursor:pointer; transition:all 0.3s; }
.level-card:hover { transform:translateY(-2px); border-color:var(--accent); box-shadow:0 8px 30px rgba(99,102,241,0.1); }
.level-card .lvl-badge { display:inline-block; padding:4px 12px; border-radius:20px; font-size:11px; font-weight:600; margin-bottom:12px; }
.level-card h3 { font-size:18px; font-weight:700; margin-bottom:6px; }
.level-card p { font-size:13px; color:var(--text-sec); line-height:1.5; }
.level-card .lvl-progress { margin-top:12px; font-size:12px; color:var(--text-sec); }
.lesson-page { max-width:800px; margin:0 auto; }
.lesson-header { margin-bottom:24px; }
.lesson-header .breadcrumb { font-size:12px; color:var(--text-sec); margin-bottom:8px; }
.lesson-header h1 { font-size:28px; font-weight:800; margin-bottom:8px; }
.lesson-header .meta { display:flex; align-items:center; gap:16px; font-size:12px; color:var(--text-sec); }
.lesson-body { font-size:15px; line-height:1.8; }
.lesson-body h2 { font-size:22px; font-weight:700; margin:32px 0 12px; }
.lesson-body h3 { font-size:18px; font-weight:600; margin:24px 0 10px; }
.lesson-body p { margin-bottom:16px; }
.lesson-body ul, .lesson-body ol { margin-bottom:16px; padding-left:24px; }
.lesson-body li { margin-bottom:6px; }
.lesson-body code { font-family:var(--code-font); background:rgba(99,102,241,0.1); padding:2px 6px; border-radius:4px; font-size:13px; }
.lesson-body pre { background:#0d0f14; border:1px solid var(--border); border-radius:10px; padding:16px; overflow-x:auto; margin-bottom:16px; font-size:13px; line-height:1.5; }
.lesson-actions { display:flex; gap:12px; margin-top:32px; padding-top:24px; border-top:1px solid var(--border); }
.btn { padding:10px 24px; border-radius:8px; font-size:13px; font-weight:600; font-family:inherit; cursor:pointer; transition:all 0.2s; border:none; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent-light); }
.btn-success { background:var(--success); color:#fff; }
.btn-success:hover { opacity:0.9; }
.btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text-sec); }
.btn-ghost:hover { border-color:var(--accent); color:var(--text); }
.playground-view { display:flex; flex-direction:column; height:100%; }
.playground-toolbar { display:flex; align-items:center; gap:12px; padding:10px 20px; border-bottom:1px solid var(--border); flex-shrink:0; }
.playground-container { flex:1; display:flex; flex-direction:column; }
.playground-editor { flex:1; min-height:0; position:relative; }
.playground-editor #editor { position:absolute; inset:0; font-size:14px; }
.playground-output { height:200px; border-top:1px solid var(--border); background:#fff; }
.playground-output iframe { width:100%; height:100%; border:none; background:#fff; }
.cert-container { max-width:700px; margin:40px auto; text-align:center; }
.cert-card { background:var(--card); border:2px solid var(--accent); border-radius:16px; padding:48px 32px; position:relative; overflow:hidden; }
.cert-card::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle at center, rgba(99,102,241,0.05) 0%,transparent 60%); pointer-events:none; }
.cert-badge { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent-light)); display:flex; align-items:center; justify-content:center; font-size:36px; margin:0 auto 20px; }
.cert-card h2 { font-size:24px; font-weight:800; margin-bottom:8px; }
.cert-card .cert-sub { color:var(--text-sec); font-size:14px; margin-bottom:24px; }
.cert-progress-bar { width:100%; height:8px; background:rgba(255,255,255,0.05); border-radius:4px; overflow:hidden; margin:16px 0; }
.cert-progress-fill { height:100%; border-radius:4px; transition:width 0.5s; background:linear-gradient(90deg,var(--accent),var(--accent-light)); }
.ai-trigger { position:fixed; bottom:24px; right:24px; width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,var(--accent),#8b5cf6); border:none; color:#fff; font-size:22px; cursor:pointer; z-index:999; box-shadow:0 4px 20px rgba(99,102,241,0.4); transition:all 0.3s; display:flex; align-items:center; justify-content:center; }
.ai-trigger:hover { transform:scale(1.1); box-shadow:0 6px 30px rgba(99,102,241,0.6); }
.ai-panel { position:fixed; bottom:90px; right:24px; width:380px; height:520px; background:var(--surface); border:1px solid var(--border); border-radius:16px; z-index:998; display:none; flex-direction:column; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
.ai-panel.open { display:flex; }
.ai-header { padding:16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; background:linear-gradient(135deg,rgba(99,102,241,0.1),rgba(139,92,246,0.1)); }
.ai-header .ai-icon { width:32px; height:32px; border-radius:8px; background:linear-gradient(135deg,var(--accent),#8b5cf6); display:flex; align-items:center; justify-content:center; font-size:16px; }
.ai-header h3 { font-size:14px; font-weight:600; flex:1; }
.ai-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
.ai-msg { max-width:85%; padding:12px 16px; border-radius:12px; font-size:13px; line-height:1.6; animation:msgIn 0.3s ease; }
@keyframes msgIn { from {opacity:0;transform:translateY(8px)} to {opacity:1;transform:translateY(0)} }
.ai-msg.bot { background:var(--card); border:1px solid var(--border); align-self:flex-start; border-bottom-left-radius:4px; }
.ai-msg.user { background:var(--accent); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
.ai-msg pre { background:rgba(0,0,0,0.4); border-radius:8px; padding:12px; overflow-x:auto; margin:8px 0; font-size:12px; }
.ai-input-area { padding:12px; border-top:1px solid var(--border); display:flex; gap:8px; }
.ai-input-area input { flex:1; padding:10px 14px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:13px; font-family:inherit; outline:none; }
.ai-input-area input:focus { border-color:var(--accent); }
.ai-input-area .send-btn { width:38px; height:38px; border-radius:8px; border:none; background:var(--accent); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; transition:all 0.2s; }
@media(max-width:768px){ .sidebar { width:220px; } .content-area { padding:20px; } .level-cards { grid-template-columns:1fr; } .hero-section h1 { font-size:28px; } .stats { gap:20px; } }
@media(max-width:640px){ .sidebar { display:none; } .sidebar.mobile-open { display:flex; position:fixed; inset:0; z-index:50; width:100%; } .ai-panel { width:calc(100vw-32px); right:16px; bottom:80px; height:60vh; } }
</style>
</head>
<body>
<div class="app-container" id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">BW</div>
      <div>
        <h1>Blaze<span>Web</span>Guide</h1>
        <div class="sub" id="totalLessons">1000 Lessons</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <div class="level-selector" id="levelSelector"></div>
      <div id="moduleList" style="margin-top:16px;display:none;"></div>
    </nav>
  </aside>
  <main class="main-content">
    <div class="top-bar">
      <div class="search-box">
        <span class="icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search any lesson..." oninput="handleSearch(this.value)">
      </div>
      <div class="top-actions">
        <button class="top-btn" onclick="showPlayground()">💻 Playground</button>
        <button class="top-btn" onclick="showCert()" id="certBtn">🏆 Certificate</button>
      </div>
    </div>
    <div class="content-area" id="contentArea"></div>
  </main>
</div>
<button class="ai-trigger" id="aiTrigger" onclick="toggleAI()">🤖</button>
<div class="ai-panel" id="aiPanel">
  <div class="ai-header">
    <div class="ai-icon">🧠</div>
    <h3>Blaze AI Tutor</h3>
    <button class="close-btn" onclick="toggleAI()" style="background:none;border:none;color:var(--text-sec);cursor:pointer;font-size:18px;">✕</button>
  </div>
  <div class="ai-messages" id="aiMessages">
    <div class="ai-msg bot">Hey! I'm your AI tutor. Ask me anything about web development 🚀</div>
  </div>
  <div class="ai-input-area">
    <input type="text" id="aiInput" placeholder="Ask a question..." onkeydown="if(event.key==='Enter')sendAI()">
    <button class="send-btn" onclick="sendAI()">➤</button>
  </div>
</div>

<script>
let currentLevel = null, currentModule = null, currentLesson = null, currentView = 'landing', playgroundHTML = '';

function getProgress() { try { return JSON.parse(localStorage.getItem('bwg_progress')||'{}'); } catch { return {}; } }
function saveProgress(p) { localStorage.setItem('bwg_progress',JSON.stringify(p)); }
function isComplete(id) { return !!getProgress()[id]; }
function toggleComplete(id) { const p=getProgress(); if(p[id]) delete p[id]; else p[id]=true; saveProgress(p); renderAll(); }

function getLevelProgress(lvlId) {
  const p=getProgress(), lvl=CURRICULUM[lvlId]; if(!lvl) return {done:0,total:0,pct:0};
  let t=0,d=0; lvl.modules.forEach(m=>m.lessons.forEach(l=>{t++;if(p[l.id]||l.isCapstone)d++;}));
  return {done:d,total:t,pct:t?Math.round(d/t*100):0};
}
function isLevelComplete(lvlId) { const prog=getLevelProgress(lvlId); return prog.total>0 && prog.pct>=100; }
function isLevelUnlocked(lvlId) {
  const order=['beginner','intermediate','advanced','pro'];
  const idx=order.indexOf(lvlId);
  if(idx===0) return true;
  return isLevelComplete(order[idx-1]);
}
function getOverall() {
  let t=0,d=0; const p=getProgress();
  Object.values(CURRICULUM).forEach(l=>l.modules.forEach(m=>m.lessons.forEach(l=>{t++;if(p[l.id])d++;})));
  return {done:d,total:t,pct:t?Math.round(d/t*100):0};
}

function renderAll() {
  renderLevelSelector();
  if(currentLevel) renderModuleList();
  if(currentView==='landing') renderLanding();
  else if(currentView==='lesson'&&currentLesson) renderLesson();
  else if(currentView==='playground') renderPlayground();
  else if(currentView==='cert') renderCert();
  document.getElementById('certBtn').textContent = getOverall().pct>=100?'🎉 Cert':`🏆 ${getOverall().pct}%`;
}

function renderLevelSelector() {
  const el=document.getElementById('levelSelector');
  const levels=['beginner','intermediate','advanced','pro'];
  const colors={'beginner':'#22c55e','intermediate':'#3b82f6','advanced':'#f59e0b','pro':'#ef4444'};
  const names={'beginner':'Beginner','intermediate':'Intermediate','advanced':'Advanced','pro':'Pro'};
  el.innerHTML=levels.map(id=>{
    const lvl=CURRICULUM[id],prog=getLevelProgress(id);
    const count=lvl?lvl.modules.reduce((a,m)=>a+m.lessons.length,0):0;
    return '<button class="level-btn '+(currentLevel===id?'active':'')+'" onclick="switchLevel(\''+id+'\')"><span class="dot" style="background:'+colors[id]+'"></span><span class="lvl-name">'+names[id]+'</span><span class="count">'+prog.done+'/'+count+'</span></button>';
  }).join('');
}

function renderModuleList() {
  const el=document.getElementById('moduleList'),lvl=CURRICULUM[currentLevel];
  if(!lvl){el.innerHTML='';return;}
  const p=getProgress();
  el.innerHTML=lvl.modules.map((mod,mi)=>{
    const c=mod.lessons.filter(l=>p[l.id]).length,open=currentModule===mod.id?'open':'';
    return '<div class="module-group"><button class="module-header '+open+'" onclick="toggleModule(\''+mod.id+'\')"><span class="arrow">▶</span>'+mod.title+'<span class="mod-progress">'+c+'/'+mod.lessons.length+'</span></button><div class="lesson-list '+open+'">'+mod.lessons.map(l=>{
      const active=currentLesson===l.id?'active':'',done=p[l.id]?'completed':'';
      return '<button class="lesson-item '+active+' '+done+'" onclick="openLesson(\''+mod.id+'\',\''+l.id+'\')"><span class="check">'+(done?'✓':'○')+'</span>'+l.title+'<span class="dur">'+l.duration+'</span></button>';
    }).join('')+'</div></div>';
  }).join('');
}

function renderLanding() {
  currentView='landing';
  const o=getOverall(),levels=[{id:'beginner',name:'Beginner',desc:'Start from absolute zero. Learn HTML, CSS, JavaScript, and Git.',color:'#22c55e'},{id:'intermediate',name:'Intermediate',desc:'Master responsive design, APIs, ES6+, build tools, and deployment.',color:'#3b82f6'},{id:'advanced',name:'Advanced',desc:'Dive into React, Node.js, databases, authentication, and testing.',color:'#f59e0b'},{id:'pro',name:'Pro',desc:'Architecture, performance, security, DevOps, system design, and more.',color:'#ef4444'}];
  const el=document.getElementById('contentArea');
  const levelCards=levels.map(l=>{const p=getLevelProgress(l.id),lvl=CURRICULUM[l.id],c=lvl?lvl.modules.reduce((a,m)=>a+m.lessons.length,0):0;const unlocked=isLevelUnlocked(l.id);const completed=isLevelComplete(l.id);return '<div class="level-card '+(unlocked?'':'opacity-50 pointer-events-none')+'" onclick="'+(unlocked?'switchLevel(\''+l.id+'\')':'')+'" style="'+(unlocked?'':'opacity:0.5;cursor:default;')+'"><div class="lvl-badge" style="background:'+l.color+'22;color:'+l.color+'">'+l.name+(completed?' ✅':'')+(unlocked?'':' 🔒')+'</div><h3>'+l.name+'</h3><p>'+l.desc+'</p><div class="lvl-progress">'+(completed?'🎉 Completed! ('+p.pct+'%)':unlocked?p.done+'/'+c+' lessons ('+p.pct+'%)':'🔒 Complete '+levels[Math.max(0,levels.indexOf(l)-1)].name+' first')+'</div>'+(completed?'<button class="btn btn-ghost" onclick="event.stopPropagation();showLevelCert(\''+l.id+'\')" style="margin-top:8px;font-size:11px;">🏆 View Certificate</button>':'')+'</div>';}).join('');
  el.innerHTML='<div class="landing"><div class="hero-section"><h1>Master Web Development<br><span>Zero to Pro</span></h1><p>A complete, hands-on curriculum with '+o.total+' lessons covering everything from your first HTML tag to production-ready system design.</p><div class="stats"><div class="stat-item"><div class="stat-num" style="color:var(--accent-light)">'+o.total+'</div><div class="stat-label">Lessons</div></div><div class="stat-item"><div class="stat-num" style="color:var(--success)">4</div><div class="stat-label">Levels</div></div><div class="stat-item"><div class="stat-num" style="color:var(--warn)">'+o.done+'</div><div class="stat-label">Completed</div></div></div>'+(o.pct>0?'<div class="cert-progress-bar" style="max-width:400px;margin:0 auto 40px;"><div class="cert-progress-fill" style="width:'+o.pct+'%"></div></div>':'')+'<button class="btn btn-primary" onclick="switchLevel(\'beginner\')" style="font-size:15px;padding:12px 32px;">Start Learning</button></div><div class="level-cards">'+levelCards+'</div></div>';
}

function renderLesson() {
  currentView='lesson';
  for(const lvlId of Object.keys(CURRICULUM)){const lvl=CURRICULUM[lvlId];for(const mod of lvl.modules){for(const les of mod.lessons){if(les.id===currentLesson){const done=isComplete(les.id);const el=document.getElementById('contentArea');el.innerHTML='<div class="lesson-page"><div class="lesson-header"><div class="breadcrumb">'+lvl.title+' / '+mod.title+'</div><h1>'+les.title+'</h1><div class="meta"><span>⏱ '+les.duration+'</span><span>'+(done?'✅ Completed':'○ Not completed')+'</span></div></div><div class="lesson-body">'+(les.content||'<p>Content coming soon.</p>')+'</div>'+(les.codeExample?'<pre><code>'+escHtml(les.codeExample)+'</code></pre><button class="btn btn-ghost" onclick="openInPlayground(\''+escJs(les.codeExample)+'\')">▶ Run in Playground</button>':'')+'<div class="lesson-actions"><button class="btn '+(done?'btn-ghost':'btn-success')+'" onclick="toggleComplete(\''+les.id+'\')">'+(done?'✓ Mark Incomplete':'✓ Mark Complete')+'</button><button class="btn btn-ghost" onclick="showLanding()">← Back</button></div></div>';return;}}}}
}

function showLanding(){currentLevel=null;currentLesson=null;currentView='landing';document.getElementById('moduleList').style.display='none';renderAll();}
function switchLevel(id){currentLevel=id;currentModule=CURRICULUM[id]?.modules?.[0]?.id||null;currentLesson=null;const el=document.getElementById('moduleList');el.style.display='block';renderAll();if(currentModule)toggleModule(currentModule);}
function toggleModule(id){currentModule=currentModule===id?null:id;renderModuleList();}
function openLesson(mid,lid){currentModule=mid;currentLesson=lid;renderModuleList();renderLesson();}
function showPlayground(){currentView='playground';renderPlayground();}
function showCert(){currentView='cert';renderCert();}

function renderPlayground(){
  const el=document.getElementById('contentArea');
  el.innerHTML='<div class="playground-view"><div class="playground-toolbar"><h2>💻 Code Playground</h2><button class="btn btn-primary" onclick="runPlayground()" style="padding:6px 16px;font-size:12px;">▶ Run</button><button class="btn btn-ghost" onclick="resetPlayground()" style="padding:6px 16px;font-size:12px;">↺ Reset</button></div><div class="playground-container"><div class="playground-editor" id="playgroundEditor"><div id="editor"></div></div><div class="playground-output"><iframe id="playgroundFrame"></iframe></div></div></div>';
  if(typeof ace!=='undefined'){
    const editor=ace.edit('editor');editor.setTheme('ace/theme/monokai');editor.session.setMode('ace/mode/html');
    editor.setValue(playgroundHTML||defaultHTML,-1);
    editor.setOptions({fontSize:'14px',showPrintMargin:false,wrap:true});
    window.playgroundEditor=editor;runPlayground();
  }
}
function runPlayground(){const ed=window.playgroundEditor;if(!ed)return;const frame=document.getElementById('playgroundFrame');if(frame)frame.srcdoc=ed.getValue();}
function resetPlayground(){const ed=window.playgroundEditor;if(ed){ed.setValue(defaultHTML,-1);runPlayground();}}
function openInPlayground(c){playgroundHTML=c;showPlayground();}

function showLevelCert(levelId){
  const lvl=CURRICULUM[levelId];
  if(!lvl||!isLevelComplete(levelId)) return;
  const names={'beginner':'Beginner','intermediate':'Intermediate','advanced':'Advanced','pro':'Pro'};
  const el=document.getElementById('contentArea');
  el.innerHTML='<div class="cert-container"><div class="cert-card"><div class="cert-badge">🏆</div><h2>Certificate of Completion</h2><p class="cert-sub">'+names[levelId]+' Level</p><p style="font-size:12px;color:var(--text-sec);margin-top:8px;">BlazeWebGuide</p><p style="font-size:11px;color:var(--text-sec);margin-top:4px;">Awarded '+new Date().toLocaleDateString()+'</p><button class="btn btn-primary" onclick="window.print()" style="margin-top:16px;">🖨 Print</button><button class="btn btn-ghost" onclick="showLanding()" style="margin-top:8px;">← Back</button></div></div>';
}

function renderCert(){
  const o=getOverall(),el=document.getElementById('contentArea');
  const levels=['beginner','intermediate','advanced','pro'];
  const names={'beginner':'Beginner','intermediate':'Intermediate','advanced':'Advanced','pro':'Pro'};
  const colors={'beginner':'#22c55e','intermediate':'#3b82f6','advanced':'#f59e0b','pro':'#ef4444'};
  
  let html='<div class="cert-container"><h2 style="font-size:20px;font-weight:700;margin-bottom:24px;">🏆 Certifications</h2>';
  levels.forEach(id=>{
    const complete=isLevelComplete(id);
    const unlocked=isLevelUnlocked(id);
    const prog=getLevelProgress(id);
    html+='<div style="padding:20px;border:1px solid var(--border);border-radius:12px;margin-bottom:12px;background:var(--card);">';
    html+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;"><span class="lvl-badge" style="background:'+colors[id]+'22;color:'+colors[id]+';padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;">'+names[id]+'</span>';
    if(complete) html+='<span style="color:var(--success);font-size:13px;">✅ Completed</span>';
    else if(unlocked) html+='<span style="color:var(--text-sec);font-size:13px;">In progress ('+prog.pct+'%)</span>';
    else html+='<span style="color:var(--text-sec);font-size:13px;">🔒 Locked</span>';
    html+='</div>';
    html+='<div class="cert-progress-bar"><div class="cert-progress-fill" style="width:'+prog.pct+'%"></div></div>';
    if(complete) html+='<button class="btn btn-ghost" onclick="showLevelCert(\''+id+'\')" style="margin-top:8px;font-size:12px;padding:6px 16px;">View Certificate →</button>';
    html+='</div>';
  });
  
  if(o.pct>=100){
    html+='<div style="padding:24px;border:2px solid var(--accent);border-radius:12px;margin-top:16px;text-align:center;background:var(--card);"><h3 style="font-size:18px;font-weight:700;margin-bottom:4px;">🎉 Grand Master Certificate</h3><p style="color:var(--text-sec);font-size:13px;margin-bottom:12px;">All '+o.total+' lessons completed across all levels!</p><button class="btn btn-primary" onclick="window.print()">🖨 Print</button></div>';
  }
  
  html+='</div>';
  el.innerHTML=html;
}

function handleSearch(q){
  const query=q.toLowerCase().trim();
  if(!query||query.length<2){renderAll();return;}
  const results=[];
  Object.entries(CURRICULUM).forEach(([lvlId,lvl])=>{
    lvl.modules.forEach(mod=>{mod.lessons.forEach(l=>{if(l.title.toLowerCase().includes(query)||(l.content&&l.content.toLowerCase().includes(query)))results.push({...l,level:lvl.title,module:mod.title,levelId:lvlId,modId:mod.id});});});
  });
  const area=document.getElementById('contentArea');
  area.innerHTML='<div class="landing"><h2 style="font-size:20px;font-weight:700;margin-bottom:16px;">🔍 Results for "'+q+'"</h2>'+(results.length===0?'<p style="color:var(--text-sec)">No results found.</p>':results.slice(0,30).map(r=>'<div style="padding:12px 16px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;background:var(--card)" onclick="switchLevel(\''+r.levelId+'\');setTimeout(()=>openLesson(\''+r.modId+'\',\''+r.id+'\'),100)"><div style="font-size:12px;color:var(--text-sec);margin-bottom:4px;">'+r.level+' / '+r.module+'</div><div style="font-weight:600;">'+r.title+'</div></div>').join(''))+'</div>';
}

function escHtml(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escJs(s){if(!s)return'';return s.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');}

// AI Tutor
const AI_BACKEND='https://keith-switching-meaning-calculate.trycloudflare.com';
function toggleAI(){const p=document.getElementById('aiPanel');p.classList.toggle('open');if(p.classList.contains('open'))document.getElementById('aiInput').focus();}
async function sendAI(){
  const inp=document.getElementById('aiInput'),msg=inp.value.trim();if(!msg)return;
  addAI(msg,'user');inp.value='';
  const tid=showTyping();
  try{
    const r=await fetch(AI_BACKEND+'/api/tutor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,context:{currentLesson,currentLevel,completed:Object.keys(getProgress()).length}})});
    const d=await r.json();removeTyping(tid);addAI(d.reply||'Sorry, could not process.','bot');
  }catch(e){removeTyping(tid);addAI('Tutor is offline. Try again later.','bot');}
}
function addAI(t,s){const c=document.getElementById('aiMessages'),d=document.createElement('div');d.className='ai-msg '+s;d.innerHTML=t.replace(/```(\w*)\n?([\s\S]*?)```/g,'<pre><code>$2</code></pre>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\n/g,'<br>');c.appendChild(d);c.scrollTop=c.scrollHeight;}
function showTyping(){const c=document.getElementById('aiMessages'),d=document.createElement('div');d.className='ai-msg bot';d.id='typing-'+Date.now();d.innerHTML='<span>typing...</span>';c.appendChild(d);return d.id;}
function removeTyping(id){const e=document.getElementById(id);if(e)e.remove();}

const defaultHTML = '<!DOCTYPE html><html><head><style>body{font-family:system-ui;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background:#0f172a;color:#fff;}.card{background:#1e293b;padding:32px;border-radius:16px;text-align:center;}h1{color:#818cf8;}button{background:#6366f1;color:#fff;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:16px;margin-top:16px;}button:hover{background:#818cf8;}</style></head><body><div class="card"><h1>🚀 BlazeWebGuide</h1><p>Edit this code and see changes live!</p><button onclick="alert(\'Hello from BlazeWebGuide!\')">Click Me</button></div></body></html>';

// Init
function init(){
  if(typeof CURRICULUM==='undefined'){document.getElementById('contentArea').innerHTML='<div style="text-align:center;padding:80px"><h2>Loading...</h2></div>';setTimeout(init,500);return;}
  renderAll();
}
init();
</script>
