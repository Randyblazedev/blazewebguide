<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlazeWebGuide</title>
<script src="curriculum_tiny.js"></script>
<style>
body { margin:0; font-family:system-ui,sans-serif; background:#0a0c10; color:#e2e8f0; }
.sidebar { width:240px; position:fixed; top:0; left:0; bottom:0; background:#111318; border-right:1px solid #1e2230; padding:20px; overflow-y:auto; }
.logo { font-size:18px; font-weight:800; margin-bottom:20px; }
.logo span { color:#818cf8; }
.nav { list-style:none; padding:0; }
.nav li { padding:10px 14px; margin:4px 0; border-radius:8px; cursor:pointer; color:#94a3b8; font-size:14px; transition:.2s; }
.nav li:hover { background:rgba(99,102,241,.08); color:#e2e8f0; }
.nav li.active { background:rgba(99,102,241,.12); color:#818cf8; }
.nav li .count { float:right; font-size:12px; opacity:.6; }
.main { margin-left:240px; padding:32px; }
h1 { font-size:32px; font-weight:800; letter-spacing:-1px; }
h1 span { color:#818cf8; }
.cards { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:24px; }
.card { padding:24px; border:1px solid #1e2230; border-radius:12px; background:#181b22; cursor:pointer; transition:.2s; }
.card:hover { border-color:rgba(99,102,241,.3); transform:translateY(-2px); }
.card .tag { font-size:12px; font-weight:600; padding:2px 10px; border-radius:20px; display:inline-block; margin-bottom:8px; }
.card h3 { font-size:18px; font-weight:600; margin:0 0 4px; }
.card p { font-size:13px; color:#94a3b8; margin:0; }
.lessons { max-width:600px; }
.lesson { padding:12px 16px; border:1px solid #1e2230; border-radius:8px; margin-bottom:8px; cursor:pointer; transition:.2s; }
.lesson:hover { background:rgba(99,102,241,.06); }
.lesson .title { font-weight:600; font-size:14px; }
.lesson .meta { font-size:12px; color:#94a3b8; margin-top:4px; }
@media(max-width:768px){ .sidebar { width:200px; } .main { margin-left:200px; padding:20px; } .cards { grid-template-columns:1fr; } }
@media(max-width:640px){ .sidebar { display:none; } .main { margin-left:0; padding:16px; } h1 { font-size:24px; } }
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo">Blaze<span>Web</span>Guide</div>
  <ul class="nav" id="nav"></ul>
</div>
<div class="main" id="main">
  <h1>Loading...</h1>
</div>

<script>
var LVL = null;

function render() {
  // Render nav
  var nav = document.getElementById('nav');
  nav.innerHTML = '';
  var keys = Object.keys(CURRICULUM);
  keys.forEach(function(k) {
    var l = CURRICULUM[k];
    var li = document.createElement('li');
    li.className = LVL === k ? 'active' : '';
    li.innerHTML = l.title + ' <span class="count">' + l.modules.reduce(function(a,m){return a+m.lessons.length;},0) + '</span>';
    li.onclick = function(){ LVL=k; render(); };
    nav.appendChild(li);
  });

  // Render content
  var main = document.getElementById('main');
  if (!LVL) {
    var total = 0;
    Object.values(CURRICULUM).forEach(function(l){l.modules.forEach(function(m){total+=m.lessons.length;});});
    var colors = {beginner:'#22c55e',intermediate:'#3b82f6',advanced:'#f59e0b',pro:'#ef4444'};
    var names = {beginner:'Beginner',intermediate:'Intermediate',advanced:'Advanced',pro:'Pro'};
    main.innerHTML = '<h1>Master Web Development<br><span>From Zero to Pro</span></h1><p style="color:#94a3b8;font-size:16px;">'+total+' lessons across 4 levels. Start your journey.</p><div class="cards">' +
      keys.map(function(k){return '<div class="card" onclick="LVL=\''+k+'\';render()"><div class="tag" style="background:'+colors[k]+'22;color:'+colors[k]+'">'+names[k]+'</div><h3>'+CURRICULUM[k].title+'</h3><p>'+CURRICULUM[k].subtitle+'</p></div>';}).join('') +
      '</div>';
  } else {
    var lvl = CURRICULUM[LVL];
    var html = '<h1>' + lvl.title + '</h1><div class="lessons">';
    lvl.modules.forEach(function(mod){
      html += '<h3 style="margin:16px 0 8px;font-size:14px;color:#94a3b8;">' + mod.title + '</h3>';
      mod.lessons.forEach(function(l){
        html += '<div class="lesson" onclick="alert(\''+l.title+'\\n\\n'+l.content.replace(/'/g,"\\'").replace(/\n/g,'\\n')+'\\n\\nChallenge: '+l.challenge.replace(/'/g,"\\'")+'\')"><div class="title">'+l.title+'</div><div class="meta">'+l.duration+'</div></div>';
      });
    });
    html += '</div><button onclick="LVL=null;render()" style="margin-top:16px;padding:8px 20px;border-radius:8px;border:1px solid #1e2230;background:transparent;color:#94a3b8;cursor:pointer;">← Back</button>';
    main.innerHTML = html;
  }
}

// Wait for CURRICULUM
function init() {
  if (typeof CURRICULUM !== 'undefined' && CURRICULUM.beginner) { render(); return; }
  document.getElementById('main').innerHTML = '<h1>Loading curriculum...</h1>';
  setTimeout(init, 200);
}
init();
</script>
</body>
</html>
