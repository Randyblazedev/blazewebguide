<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>BlazeWebGuide</title>
<script src="curriculum.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0a0c10;color:#e2e8f0;min-height:100vh}
.app{display:flex;height:100vh}
.sidebar{width:230px;background:#111318;border-right:1px solid #1e2230;display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:16px;border-bottom:1px solid #1e2230;font-size:15px;font-weight:700}
.logo span{color:#818cf8}
.nav{flex:1;overflow-y:auto;padding:8px}
.nav-item{padding:10px 14px;margin:2px 0;border-radius:8px;cursor:pointer;font-size:13px;color:#94a3b8;transition:.15s}
.nav-item:hover{background:rgba(99,102,241,.08);color:#e2e8f0}
.nav-item.active{background:rgba(99,102,241,.12);color:#818cf8}
.nav-item .badge{float:right;font-size:11px;opacity:.5}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:12px;padding:10px 20px;border-bottom:1px solid #1e2230;flex-shrink:0}
.topbar .btn{padding:6px 14px;border-radius:8px;border:1px solid #1e2230;background:transparent;color:#94a3b8;cursor:pointer;font-size:12px;transition:.15s;font-family:inherit}
.topbar .btn:hover{border-color:#6366f1;color:#e2e8f0}
.content{flex:1;overflow-y:auto;padding:24px}
h1{font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1.1}
h1 span{color:#818cf8}
p{color:#94a3b8;font-size:14px;line-height:1.6;margin:8px 0}
.grid{display:grid;gap:12px}
.grid-2{grid-template-columns:1fr 1fr}
.card{padding:20px;border:1px solid #1e2230;border-radius:12px;background:#181b22;cursor:pointer;transition:.2s}
.card:hover{border-color:rgba(99,102,241,.3);transform:translateY(-1px)}
.card .tag{font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;display:inline-block;margin-bottom:8px}
.card h3{font-size:16px;font-weight:600}
.card p{font-size:12px;color:#94a3b8;margin-top:4px}
.back{display:inline-block;margin-top:16px;padding:8px 20px;border-radius:8px;border:1px solid #1e2230;background:transparent;color:#94a3b8;cursor:pointer;font-size:13px;font-family:inherit}
.back:hover{border-color:#6366f1;color:#e2e8f0}
.mod{margin-bottom:8px;border:1px solid #1e2230;border-radius:10px;overflow:hidden}
.mod-head{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;transition:.15s}
.mod-head:hover{background:rgba(255,255,255,.02)}
.mod-head .arrow{font-size:9px;color:#94a3b8;transition:.2s}
.mod-head .arrow.o{transform:rotate(90deg)}
.mod-head .count{margin-left:auto;font-size:11px;color:#94a3b8;font-weight:400}
.mod-body{border-top:1px solid #1e2230}
.les{padding:10px 16px 10px 36px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;transition:.1s;border-left:2px solid transparent}
.les:hover{background:rgba(255,255,255,.03)}
.les.active{border-color:#6366f1;background:rgba(99,102,241,.06)}
.les .dur{margin-left:auto;font-size:11px;color:#94a3b8}
.lesson-body{font-size:14px;line-height:1.8;max-width:680px;margin:0 auto}
.lesson-body p{margin-bottom:12px;font-size:14px;color:#e2e8f0}
.lesson-body code{background:rgba(99,102,241,.1);padding:1px 5px;border-radius:4px;font-size:13px}
.lesson-body pre{background:#0d0f14;border:1px solid #1e2230;border-radius:8px;padding:14px;overflow-x:auto;margin-bottom:12px;font-size:13px}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}.content{padding:16px}h1{font-size:22px}}
@media(max-width:640px){.sidebar{display:none}.content{padding:12px}}
</style>
</head>
<body>
<div class="app">
<div class="sidebar">
<div class="logo">Blaze<span>Web</span>Guide</div>
<div class="nav" id="nav"></div>
</div>
<main class="main">
<div class="topbar">
<button class="btn" onclick="showHome()">🏠 Home</button>
<button class="btn" onclick="showCert()">🏆 Cert</button>
</div>
<div class="content" id="content"></div>
</main>
</div>

<script>
let LVL=null,MOD=null,LES=null,VIEW='home';
let contentLoaded=false;

function lvlP(id){
  const l=CURRICULUM[id];if(!l)return{d:0,t:0};
  let t=0;l.modules.forEach(m=>t+=m.lessons.length);
  return{d:0,t};
}

function render(){
  const keys=Object.keys(CURRICULUM);
  const colors={beginner:'#22c55e',intermediate:'#3b82f6',advanced:'#f59e0b',pro:'#ef4444'};
  document.getElementById('nav').innerHTML=keys.map(k=>{
    const l=CURRICULUM[k],t=lvlP(k);
    return `<div class="nav-item ${LVL===k?'active':''}" onclick="showLevel('${k}')"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${colors[k]};margin-right:8px"></span>${l.title}<span class="badge">${t.t}</span></div>`;
  }).join('');
  if(VIEW==='home')renderHome();
  else if(VIEW==='level')renderLevel();
  else if(VIEW==='lesson')renderLesson();
}

function renderHome(){
  const keys=Object.keys(CURRICULUM);
  const colors={beginner:'#22c55e',intermediate:'#3b82f6',advanced:'#f59e0b',pro:'#ef4444'};
  const names={beginner:'Beginner',intermediate:'Intermediate',advanced:'Advanced',pro:'Pro'};
  let total=0;Object.values(CURRICULUM).forEach(l=>l.modules.forEach(m=>total+=m.lessons.length));
  document.getElementById('content').innerHTML='<h1>Master Web Development<br><span>From Zero to Pro</span></h1><p>'+total+' lessons across 4 levels. Start your journey.</p><div class="grid grid-2">'+
    keys.map(k=>'<div class="card" onclick="showLevel(\''+k+'\')"><div class="tag" style="background:'+colors[k]+'22;color:'+colors[k]+'">'+names[k]+'</div><h3>'+CURRICULUM[k].title+'</h3><p>Start learning '+names[k].toLowerCase()+' level</p></div>').join('')+
    '</div>';
}

function showHome(){VIEW='home';LVL=null;LES=null;render();}
function showLevel(id){
  LVL=id;MOD=null;LES=null;VIEW='level';
  render();
  renderLevel();
}
function renderLevel(){
  const l=CURRICULUM[LVL];if(!l)return;
  let html='<h1>'+l.title+'</h1>';
  l.modules.forEach(mod=>{
    const open=MOD===mod.id;
    html+='<div class="mod"><div class="mod-head" onclick="MOD=MOD===\''+mod.id+'\'?null:\''+mod.id+'\';renderLevel()"><span class="arrow ${open?o:}">▶</span>'+mod.title+'<span class="count">'+mod.lessons.length+'</span></div>';
    if(open)html+='<div class="mod-body">'+mod.lessons.map(l=>'<div class="les" onclick="openLesson(\''+mod.id+'\',\''+l.id+'\')"><span>'+l.title+'</span><span class="dur">'+l.duration+'</span></div>').join('')+'</div>';
    html+='</div>';
  });
  html+='<button class="back" onclick="showHome()">← Back</button>';
  document.getElementById('content').innerHTML=html;
}

function openLesson(mid,lid){
  MOD=mid;LES=lid;VIEW='lesson';
  const l=findLes(lid);
  if(!l){document.getElementById('content').innerHTML='<p>Lesson not found</p><button class="back" onclick="showLevel(\''+LVL+'\')">← Back</button>';return;}
  
  if(contentLoaded&&window.LESSON_CONTENT&&window.LESSON_CONTENT[lid]){
    showLessonContent(l);
  } else {
    // Show loading then fetch content
    document.getElementById('content').innerHTML='<h1>'+l.title+'</h1><p style="color:#94a3b8">Loading lesson content...</p><button class="back" onclick="showLevel(\''+LVL+'\')">← Back</button>';
    // Load content if not loaded
    if(!contentLoaded){
      var s=document.createElement('script');
      s.src='curriculum_content.js';
      s.onload=function(){contentLoaded=true;if(LES===lid)showLessonContent(l);};
      s.onerror=function(){document.getElementById('content').innerHTML='<h1>'+l.title+'</h1><p>'+l.challenge+'</p><pre><code>Content loading failed. Here is the challenge.</code></pre><button class="back" onclick="showLevel(\''+LVL+'\')">← Back</button>';};
      document.head.appendChild(s);
    }
  }
}

function findLes(id){
  for(const k of Object.keys(CURRICULUM))
    for(const m of CURRICULUM[k].modules)
      for(const l of m.lessons)
        if(l.id===id) return l;
  return null;
}

function showLessonContent(l){
  const c=window.LESSON_CONTENT[LES];
  document.getElementById('content').innerHTML='<div class="lesson-body"><h1>'+l.title+'</h1><div style="color:#94a3b8;font-size:12px;margin-bottom:16px">⏱ '+l.duration+'</div>'+
    (c?c.content:'<p>Content not available.</p>')+
    (c&&c.codeExample?'<pre><code>'+esc(c.codeExample)+'</code></pre>':'')+
    (l.challenge?'<div style="margin:16px 0;padding:14px;border:1px solid rgba(245,158,11,.2);background:rgba(245,158,11,.05);border-radius:8px"><strong style="color:#f59e0b">🎯 Challenge:</strong><p>'+l.challenge+'</p></div>':'')+
    '</div><button class="back" onclick="showLevel(\''+LVL+'\')">← Back</button>';
}

function showCert(){
  VIEW='cert';LVL=null;LES=null;
  const colors={beginner:'#22c55e',intermediate:'#3b82f6',advanced:'#f59e0b',pro:'#ef4444'};
  const names={beginner:'Beginner',intermediate:'Intermediate',advanced:'Advanced',pro:'Pro'};
  let html='<h1>🏆 Certifications</h1>';
  Object.keys(CURRICULUM).forEach(k=>{
    const t=lvlP(k);
    html+='<div style="padding:16px;border:1px solid '+colors[k]+';border-radius:10px;margin:8px 0;background:#181b22"><strong>'+names[k]+'</strong><p style="font-size:12px">'+t.d+'/'+t.t+' completed</p></div>';
  });
  html+='<button class="back" onclick="showHome()">← Back</button>';
  document.getElementById('content').innerHTML=html;
}

function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function init(){
  if(typeof CURRICULUM==='undefined'||!CURRICULUM.beginner){
    document.getElementById('content').innerHTML='<p>Loading curriculum...</p>';
    setTimeout(init,200);return;
  }
  render();
}
init();
</script>
</body>
</html>
