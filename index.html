<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BlazeWebGuide – Master Web Development</title>
<script src="curriculum.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#f8fafc;color:#1e293b;line-height:1.6}
header{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
header .logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;color:#0f172a}
header .logo span{color:#6366f1}
header .logo img{height:32px}
header nav{display:flex;gap:4px}
header nav a{padding:8px 16px;border-radius:8px;text-decoration:none;color:#475569;font-size:14px;font-weight:500;transition:.2s}
header nav a:hover{background:#f1f5f9;color:#6366f1}
header nav a.active{color:#6366f1;font-weight:600}
.container{max-width:1000px;margin:0 auto;padding:48px 24px}
.hero{text-align:center;padding:48px 0}
.hero h1{font-size:44px;font-weight:800;letter-spacing:-1.5px;line-height:1.1;color:#0f172a}
.hero h1 span{color:#6366f1}
.hero p{font-size:18px;color:#64748b;max-width:600px;margin:16px auto 32px;line-height:1.7}
.hero .btn{display:inline-block;padding:14px 32px;background:#6366f1;color:#fff;border-radius:10px;text-decoration:none;font-weight:600;font-size:15px;transition:.2s;border:none;cursor:pointer;font-family:inherit}
.hero .btn:hover{background:#4f46e5;transform:translateY(-1px)}
.hero .stats{display:flex;justify-content:center;gap:40px;margin-top:40px}
.hero .stats div{text-align:center}
.hero .stats .num{font-size:28px;font-weight:800;color:#6366f1}
.hero .stats .lbl{font-size:13px;color:#94a3b8;margin-top:2px}
.features{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin:48px 0}
.feature{padding:28px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;transition:.2s}
.feature:hover{border-color:#c7d2fe;box-shadow:0 4px 12px rgba(99,102,241,.08)}
.feature .icon{font-size:28px;margin-bottom:12px}
.feature h3{font-size:16px;font-weight:600;margin-bottom:4px}
.feature p{font-size:13px;color:#64748b}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px}
.card{padding:24px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;cursor:pointer;transition:.2s}
.card:hover{border-color:#c7d2fe;box-shadow:0 4px 12px rgba(99,102,241,.08)}
.card .tag{font-size:12px;font-weight:600;padding:2px 10px;border-radius:20px;display:inline-block;margin-bottom:8px}
.card h3{font-size:17px;font-weight:600;margin-bottom:4px}
.card p{font-size:13px;color:#64748b;line-height:1.5}
.lessons{max-width:700px;margin:0 auto}
.section-title{font-size:22px;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #e2e8f0}
.acc{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin-bottom:8px;background:#fff}
.acc-h{padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:.15s;font-weight:600;font-size:14px}
.acc-h:hover{background:#f8fafc}
.acc-h .arrow{font-size:10px;color:#94a3b8;transition:.2s}
.acc-h .arrow.o{transform:rotate(90deg)}
.acc-h .cnt{margin-left:auto;font-size:12px;color:#94a3b8;font-weight:400}
.acc-body{border-top:1px solid #e2e8f0}
.les{padding:10px 18px 10px 42px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;transition:.1s;border-left:2px solid transparent}
.les:hover{background:#f8fafc}
.les.active{border-color:#6366f1;background:#eef2ff}
.les .chk{font-size:12px;width:16px;text-align:center;flex-shrink:0}
.les .chk.d{color:#22c55e}
.les .ttl{flex:1}
.les .dur{font-size:12px;color:#94a3b8}
.les-v{max-width:700px;margin:0 auto}
.les-v .crumb{font-size:13px;color:#64748b;margin-bottom:4px}
.les-v h1{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.les-v .meta{font-size:13px;color:#94a3b8;margin-bottom:20px}
.les-v .body{font-size:15px;line-height:1.8;color:#334155}
.les-v .body p{margin-bottom:14px}
.les-v .body code{background:#eef2ff;padding:2px 6px;border-radius:4px;font-size:14px;color:#6366f1}
.les-v .body pre{background:#0f172a;color:#e2e8f0;border-radius:10px;padding:18px;overflow-x:auto;margin-bottom:14px;font-size:14px;line-height:1.6}
.challenge-box{margin:16px 0;padding:16px;border:1px solid #fde68a;background:#fffbeb;border-radius:10px;cursor:pointer}
.challenge-box strong{color:#d97706}
.challenge-box p{font-size:13px;color:#92400e;margin-top:4px}
.les-act{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid #e2e8f0}
.btn{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:.15s;font-family:inherit;border:none}
.btn-p{background:#6366f1;color:#fff}
.btn-p:hover{background:#4f46e5}
.btn-g{background:transparent;border:1px solid #e2e8f0;color:#475569}
.btn-g:hover{border-color:#6366f1;color:#6366f1}
textarea.ed{width:100%;height:260px;background:#0f172a;color:#e2e8f0;border:none;padding:14px;font-family:monospace;font-size:13px;resize:none;border-radius:0 0 8px 8px}
.chal-pv{height:180px;background:#fff;border-top:1px solid #e2e8f0}
.chal-pv iframe{width:100%;height:100%;border:none}
footer{text-align:center;padding:40px 24px;border-top:1px solid #e2e8f0;color:#94a3b8;font-size:13px;margin-top:48px}
footer a{color:#6366f1;text-decoration:none}
@media(max-width:768px){.features{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.hero h1{font-size:32px}.container{padding:32px 16px}}
</style>
</head>
<body>
<header>
<div class="logo"><img src="logo.png" alt="" style="width:28px">Blaze<span>Web</span>Guide</div>
<nav>
<a href="#" onclick="showHome()" id="navHome">Home</a>
<a href="#" onclick="showProfile()" id="navProfile">Profile</a>
<a href="#" onclick="showCert()" id="navCert">Cert</a>
<a href="#" id="navAuth" onclick="showAuth()">Sign In</a>
</nav>
</header>
<div class="container" id="content"></div>
<footer><p>&copy; 2026 BlazeWebGuide. Built by <a href="#">Randy Blaze</a></p></footer>

<script>
const API='https://quest-seq-medicaid-surveys.trycloudflare.com';
var LVL=null,MOD=null,LES=null,VIEW='home',CONTENT={},CONTENT_LOADED=false,PROGRESS={},USER=localStorage.getItem('bwg_user')||null;
try{PROGRESS=JSON.parse(localStorage.getItem('bwg_prog')||'{}')}catch(e){}
function saveP(){localStorage.setItem('bwg_prog',JSON.stringify(PROGRESS));if(USER)localStorage.setItem('bwg_prog_sync_'+USER,JSON.stringify(PROGRESS)),fetch(API+'/api/progress',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:USER,completed:Object.keys(PROGRESS).filter(k=>PROGRESS[k])})}).catch(function(){});}
function done(id){return!!PROGRESS[id]}
function lvlP(id){const l=CURRICULUM[id];if(!l)return{d:0,t:0,p:0};let t=0,d=0;l.modules.forEach(m=>m.lessons.forEach(l=>{t++;if(PROGRESS[l.id])d++}));return{d,t,p:t?Math.round(d/t*100):0}}
function lvlDone(id){const x=lvlP(id);return x.t>0&&x.p>=100}
function lvlUnlocked(id){const i=['beginner','intermediate','advanced','pro'].indexOf(id);return i===0||lvlDone(['beginner','intermediate','advanced','pro'][i-1])}
function updateNav(){var u=document.getElementById('navAuth');if(u)u.textContent=USER||'Sign In';}

function render(){
  updateNav();
  if(VIEW==='home')renderHome();
  else if(VIEW==='level')renderLevel();
  else if(VIEW==='lesson')renderLesson();
  else if(VIEW==='challenge')renderChallenge();
  else if(VIEW==='profile')renderProfile();
  else if(VIEW==='cert')renderCert();
}

function renderHome(){
  const keys=['beginner','intermediate','advanced','pro'];
  const colors={beginner:'#22c55e',intermediate:'#3b82f6',advanced:'#f59e0b',pro:'#ef4444'};
  const names={beginner:'Beginner',intermediate:'Intermediate',advanced:'Advanced',pro:'Pro'};
  const descs={beginner:'Master HTML, CSS, JavaScript, and Git. Build your first real projects.',intermediate:'Responsive design, APIs, ES6+, and deployment. Level up your skills.',advanced:'React, Node.js, databases, and testing. Build full-stack applications.',pro:'System design, security, DevOps, and architecture. Production-ready expertise.'};
  let total=0;Object.values(CURRICULUM).forEach(l=>l.modules.forEach(m=>total+=m.lessons.length));
  let doneC=0;Object.values(PROGRESS).forEach(v=>{if(v)doneC++});
  document.getElementById('content').innerHTML='<div class="hero"><h1>Master Web Development<br><span>From Zero to Pro</span></h1><p>A complete, hands-on curriculum with '+total+' lessons covering everything from your first HTML tag to production-ready system design. Learn by building real projects.</p><button class="btn" onclick="showLevel(\'beginner\')">Start Learning →</button><div class="stats"><div><div class="num">'+total+'</div><div class="lbl">Lessons</div></div><div><div class="num" style="color:#22c55e">4</div><div class="lbl">Levels</div></div><div><div class="num" style="color:#f59e0b">'+doneC+'</div><div class="lbl">Completed</div></div></div></div>'+
  '<h2 class="section-title">Choose Your Level</h2><div class="grid">'+
  keys.map(k=>'<div class="card" onclick="showLevel(\''+k+'\')"><div class="tag" style="background:'+colors[k]+'22;color:'+colors[k]+'">'+names[k]+(lvlDone(k)?' ✅':'')+(lvlUnlocked(k)?'':' 🔒')+'</div><h3>'+names[k]+'</h3><p>'+descs[k]+'</p></div>').join('')+
  '</div>';
}

function showHome(){VIEW='home';LVL=null;LES=null;render()}
function showLevel(id){LVL=id;MOD=null;LES=null;VIEW='level';render();renderLevel()}

function renderLevel(){
  const l=CURRICULUM[LVL];if(!l)return;
  const x=lvlP(LVL);
  const colors={beginner:'#22c55e',intermediate:'#3b82f6',advanced:'#f59e0b',pro:'#ef4444'};
  var n='<div class="lessons"><h2 class="section-title" style="border:none;padding:0">'+l.title+' <span style="font-size:14px;color:#64748b;font-weight:400">'+x.d+'/'+x.t+' lessons</span></h2>';
  l.modules.forEach(mod=>{
    const open=MOD===mod.id;
    n+='<div class="acc"><div class="acc-h" onclick="MOD=MOD===\''+mod.id+'\'?null:\''+mod.id+'\';renderLevel()"><span class="arrow '+(open?'o':'')+'">▶</span>'+mod.title+'<span class="cnt">'+mod.lessons.length+'</span></div>';
    if(open)n+='<div class="acc-body">'+mod.lessons.map(l=>'<div class="les '+(LES===l.id?'active':'')+'" onclick="openLes(\''+mod.id+'\',\''+l.id+'\')"><span class="chk '+(done(l.id)?'d':'')+'">'+(done(l.id)?'✓':'○')+'</span><span class="ttl">'+l.title+'</span><span class="dur">'+l.duration+'</span></div>').join('')+'</div>';
    n+='</div>';
  });
  n+='<div style="margin-top:16px"><button class="btn btn-g" onclick="showHome()">← Back</button></div></div>';
  document.getElementById('content').innerHTML=n;
}

function openLes(mid,lid){MOD=mid;LES=lid;VIEW='lesson';render();renderLesson()}
function renderLesson(){
  const l=findLes();if(!l)return;
  const c=CONTENT[l.id];
  var n='<div class="les-v"><div class="crumb">'+getLvlName()+' / '+getModName()+'</div><h1>'+l.title+'</h1><div class="meta">'+l.duration+' · '+(done(l.id)?'✅ Completed':'Not completed')+'</div><div class="body">'+(c&&c.content?c.content:'<p>Loading content...</p>')+'</div>'+(c&&c.codeExample?'<pre><code>'+esc(c.codeExample)+'</code></pre>':'');
  if(l.challenge)n+='<div class="challenge-box" onclick="startChallenge()"><strong>🎯 Mini Challenge — Tap to solve</strong><p>'+l.challenge+'</p></div>';
  n+='<div class="les-act">'+(done(l.id)?'<button class="btn btn-p" onclick="nextLes()">Next →</button>':'')+'<button class="btn btn-g" onclick="showLevel(\''+LVL+'\')">← Back</button></div></div>';
  document.getElementById('content').innerHTML=n;
  if(!CONTENT_LOADED)loadContent();
}

function loadContent(){fetch('curriculum_content.js').then(r=>r.text()).then(t=>{try{var s=t.indexOf('{'),d=0,e=-1;for(var i=s;i<t.length;i++){if(t[i]==='{')d++;else if(t[i]==='}'){d--;if(d===0){e=i;break;}}}if(e>s)CONTENT=JSON.parse(t.substring(s,e+1));CONTENT_LOADED=true;if(VIEW==='lesson'||VIEW==='challenge')render();}catch(e){}}).catch(function(){})}

function startChallenge(){
  VIEW='challenge';
  const l=findLes();if(!l)return;
  var starter='<!DOCTYPE html>\n<html>\n<head><title>Challenge</title></head>\n<body>\n  <!-- Your code here -->\n</body>\n</html>';
  document.getElementById('content').innerHTML='<div class="les-v"><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px"><button class="btn btn-g" onclick="openLes(\''+MOD+'\',\''+LES+'\')" style="padding:6px 12px">← Back</button><h2 style="font-size:18px;font-weight:600">🎯 Solve the Challenge</h2></div>'+
    '<div style="border:1px solid #e2e8f0;border-radius:10px;overflow:hidden"><div style="display:flex;padding:8px 12px;background:#f8fafc;border-bottom:1px solid #e2e8f0;align-items:center"><span style="flex:1;font-size:13px;color:#64748b">Write your code then submit</span><button onclick="submitChallenge()" style="padding:6px 18px;border:none;background:#6366f1;color:#fff;cursor:pointer;border-radius:6px;font-size:13px;font-weight:500">▶ Submit</button></div>'+
    '<textarea class="ed" id="chalTA" spellcheck="false"></textarea><div class="chal-pv"><iframe id="chalPrev"></iframe></div></div>'+
    '<div id="chalFB" style="margin-top:8px;font-size:13px"></div></div>';
  document.getElementById('chalTA').value=starter;
  document.getElementById('chalPrev').srcdoc=starter;
}

function submitChallenge(){
  var ta=document.getElementById('chalTA');if(!ta)return;
  var code=ta.value;document.getElementById('chalPrev').srcdoc=code;
  var fb=document.getElementById('chalFB');fb.innerHTML='🤖 Reviewing...';
  fetch('https://keith-switching-meaning-calculate.trycloudflare.com/api/tutor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:'Review this code. Be strict:```html\\n'+code+'\\n```Reply PASS if correct HTML, FAIL if wrong.',username:USER||''})})
  .then(r=>r.json()).then(d=>{
    var r=d.reply||'';
    if(r.startsWith('PASS')){fb.innerHTML='<span style="color:#22c55e;font-weight:600">✅ Correct!</span>';PROGRESS[LES]=true;saveP();setTimeout(nextLes,800);}
    else{fb.innerHTML='<span style="color:#d97706;display:block;padding:10px;background:#fffbeb;border-radius:8px">⚠️ '+r.replace(/FAIL/g,'').trim()+'</span>';}
  }).catch(function(){fb.innerHTML='<span style="color:#d97706">⚠️ AI unavailable. Ensure your code has proper HTML structure.</span>';});
}

function nextLes(){const l=findNextLes();if(l){LVL=l.l;MOD=l.m;LES=l.id;VIEW='lesson';render();renderLesson();}else showLevel(LVL);}
function findLes(){if(!LVL||!LES)return null;for(const m of(CURRICULUM[LVL]&&CURRICULUM[LVL].modules||[]))for(const l of m.lessons)if(l.id===LES)return l;return null;}
function findNextLes(){const lvl=CURRICULUM[LVL];if(!lvl)return null;for(let mi=0;mi<lvl.modules.length;mi++)for(let li=0;li<lvl.modules[mi].lessons.length;li++){if(lvl.modules[mi].lessons[li].id===LES){if(li+1<lvl.modules[mi].lessons.length)return{id:lvl.modules[mi].lessons[li+1].id,m:lvl.modules[mi].id,l:LVL};if(mi+1<lvl.modules.length)return{id:lvl.modules[mi+1].lessons[0].id,m:lvl.modules[mi+1].id,l:LVL};return null;}}return null;}
function getLvlName(){const l=CURRICULUM[LVL];return l?l.title:''}
function getModName(){if(!LVL||!MOD)return'';for(const m of(CURRICULUM[LVL]&&CURRICULUM[LVL].modules||[]))if(m.id===MOD)return m.title;return''}
function renderProfile(){let total=0;Object.values(CURRICULUM).forEach(l=>l.modules.forEach(m=>total+=m.lessons.length));let doneC=0;Object.values(PROGRESS).forEach(v=>{if(v)doneC++});const colors={beginner:'#22c55e',intermediate:'#3b82f6',advanced:'#f59e0b',pro:'#ef4444'};const names={beginner:'Beginner',intermediate:'Intermediate',advanced:'Advanced',pro:'Pro'};let html='<h2 class="section-title">'+(USER||'Guest')+'</h2><p style="color:#64748b;margin-bottom:16px">'+doneC+'/'+total+' lessons completed</p>';['beginner','intermediate','advanced','pro'].forEach(k=>{const x=lvlP(k);html+='<div style="display:flex;align-items:center;gap:10px;padding:12px 16px;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:6px;background:#fff"><span style="width:8px;height:8px;border-radius:50%;background:'+colors[k]+';flex-shrink:0"></span><span style="flex:1;font-size:14px;font-weight:500">'+names[k]+(lvlDone(k)?' ✅':'')+(lvlUnlocked(k)?'':' 🔒')+'</span><span style="font-size:12px;color:#64748b">'+x.d+'/'+x.t+'</span><div style="width:60px;height:5px;background:#e2e8f0;border-radius:4px"><div style="height:100%;width:'+x.p+'%;background:'+colors[k]+';border-radius:4px"></div></div></div>';});if(USER)html+='<button class="btn btn-g" onclick="localStorage.removeItem(\'bwg_user\');USER=null;render()" style="margin-top:12px;color:#d97706;border-color:#fde68a">Sign Out</button>';html+='<button class="btn btn-g" onclick="showHome()" style="margin-top:8px">← Back</button>';document.getElementById('content').innerHTML=html;}
function showProfile(){VIEW='profile';render()}
function showCert(){VIEW='cert';render()}
function renderCert(){const names={beginner:'Beginner',intermediate:'Intermediate',advanced:'Advanced',pro:'Pro'};const colors={beginner:'#22c55e',intermediate:'#3b82f6',advanced:'#f59e0b',pro:'#ef4444'};let html='<h2 class="section-title">🏆 Certifications</h2>';['beginner','intermediate','advanced','pro'].forEach(k=>{const d=lvlDone(k),x=lvlP(k);html+='<div style="padding:16px;border:1px solid '+(d?colors[k]:'#e2e8f0')+';border-radius:10px;margin-bottom:8px;background:#fff"><div style="font-weight:600;font-size:14px;margin-bottom:4px">'+names[k]+(d?' ✅':'')+'</div>'+(d?'<span style="font-size:12px;color:#64748b">Completed!</span>':'<div style="height:4px;background:#e2e8f0;border-radius:4px"><div style="height:100%;width:'+x.p+'%;background:'+colors[k]+';border-radius:4px"></div></div>')+'</div>';});html+='<button class="btn btn-g" onclick="showHome()" style="margin-top:12px">← Back</button>';document.getElementById('content').innerHTML=html;}
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function showAuth(){if(USER){showProfile();return;}
var o=document.createElement('div');o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center';
o.innerHTML='<div style="background:#fff;border-radius:14px;padding:32px;max-width:380px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)"><h2 style="font-size:20px;font-weight:700;margin-bottom:6px">Welcome to BlazeWebGuide</h2><p style="font-size:13px;color:#64748b;margin-bottom:20px">Enter your name to track progress across devices</p><input id="uname" placeholder="Your username" maxlength="20" autofocus style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid #e2e8f0;font-size:14px;margin-bottom:8px;outline:0;font-family:inherit"><div id="authMsg" style="font-size:12px;color:#d97706;margin-bottom:8px"></div><button onclick="reg()" style="width:100%;padding:10px;border-radius:8px;border:none;background:#6366f1;color:#fff;cursor:pointer;font-size:14px;font-weight:500;font-family:inherit">Start Learning</button><button onclick="this.parentElement.parentElement.remove()" style="width:100%;padding:8px;border:none;background:transparent;color:#64748b;cursor:pointer;font-size:12px;margin-top:6px;font-family:inherit">Cancel</button></div>';
document.body.appendChild(o);setTimeout(function(){var e=document.getElementById('uname');if(e)e.focus();},100);}
async function reg(){var inp=document.getElementById('uname'),msg=document.getElementById('authMsg');var n=inp?inp.value.trim():'';if(!n||n.length<2){if(msg)msg.textContent='Name must be 2+ characters';return;}if(msg)msg.textContent='Checking...';try{var r=await fetch(API+'/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:n})});var d=await r.json();if(d.success||d.user){USER=n;localStorage.setItem('bwg_user',n);var o=document.querySelector('[style*=\"position:fixed;inset:0\"]');if(o)o.remove();render();}else if(d.error==='Username taken'){if(msg)msg.textContent='❌ Username taken. Try another.';}else{if(msg)msg.textContent='Error: '+d.error;}}catch(e){USER=n;localStorage.setItem('bwg_user',n);var o=document.querySelector('[style*=\"position:fixed;inset:0\"]');if(o)o.remove();render();}}

function init(){if(typeof CURRICULUM==='undefined'||!CURRICULUM.beginner){document.getElementById('content').innerHTML='<p style="text-align:center;padding:40px;color:#64748b">Loading curriculum...</p>';setTimeout(init,200);return;}render();}
init();
</script>
</body>
</html>
